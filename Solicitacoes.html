<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Solicitações</title>

    <link rel="stylesheet" href="css/Solicitacoes.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="layout">

    <aside class="sidebar">
        <div class="logo">
            <h2>SupportDesk</h2>
        </div>

        <nav>
            <a href="#" class="active">Solicitações</a>
            <a href="Gerenciamentos.html">Usuários</a>
            <a href="#">Dashboard</a>
            <a href="index.html">Logout</a>
        </nav>
    </aside>

    <main class="content">

        <header class="page-header">
            <div>
                <h1>Gestão de Solicitações</h1>
                <p>Gerencie chamados e acompanhe o fluxo operacional</p>
            </div>

            <div class="header-actions">

                <div class="filtro-container">
                   <button class="filtro-btn" onclick="toggleFiltro()">Filtrar</button>

                    <div class="filtro-menu" id="menuFiltro">
                        <button onclick="filtrar('aberta')">Abertas</button>
                        <button onclick="filtrar('em andamento')">Em andamento</button>
                        <button onclick="filtrar('concluida')">Concluídas</button>
                        <button onclick="filtrar('cancelada')">Canceladas</button>
                        <button onclick="listarsolicitacoes()">Todas</button>
                    </div>
                </div>

                <button onclick="carregarSolicitantes('solicitante','solicitanteAdd'),
                carregarSolicitantes('gestor','solicitanteAdd'),
                abrirModalAdicionar(),
                carregarSolicitantes('manutentor','tecnicoAdd')">
                    Nova Solicitação
                </button>

            </div>
        </header>

        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Solicitante</th>
                        <th>Tipo</th>
                        <th>Descrição</th>
                        <th>Prioridade</th>
                        <th>Status</th>
                        <th>Técnico</th>
                        <th>Visualizar Solução</th>                     
                        <th>Ações</th>
                    </tr>
                </thead>

                <tbody id="tabelasolicitacoes"></tbody>
            </table>
        </div>

    </main>
</div>

<!-- MODAL ADICIONAR -->
<form id="formSolicitacaoAdd">

<div class="modal" id="modalAdicionar">
    <div class="modal-content">

        <h2>Nova Solicitação</h2>

        <label>Solicitante</label>
        <select id="solicitanteAdd" required class="custom-select">
            <option value="">Selecione</option>
        </select>

        <label>Tipo Manutenção</label>
        <select id="tipoAdd" required class="custom-select">
            <option value="">Selecione</option>
            <option value="predial">Predial</option>
            <option value="equipamento">Equipamento</option>
            <option value="ti">TI</option>
        </select>

        <label >Descrição</label>
          <textarea 
              id="descricaoAdd"
              class="descricao-box"
              placeholder="Descreva detalhadamente o problema encontrado...&#10;&#10;Exemplo: O ar-condicionado da sala 03 não está ligando desde ontem."
              required
          ></textarea>

        <label>Técnico</label>
        <select id="tecnicoAdd"  class="custom-select">
            <option value="">Selecione</option>
        </select>

        <label>Prioridade</label>
        <select id="prioridadeAdd" required class="custom-select" >
            <option value="">Selecione</option>
            <option value="baixa">Baixa</option>
            <option value="media">Média</option>
            <option value="alta">Alta</option>
            <option value="critica">Crítica</option>
        </select>

        <label>Status</label>
        <select id="statusAdd" required class="custom-select">
            <option value="">Selecione</option>
            <option value="aberta">Aberta</option>
            <option value="em andamento">Em andamento</option>
            <option value="concluida">Concluída</option>
            <option value="cancelada">Cancelada</option>
        </select>

        <div class="modal-buttons">
            <button onclick="fecharModal('modalAdicionar')">Cancelar</button>
            <button type="button" onclick="validarFormularioAdd()">Salvar</button>
        </div>

    </div>
</div> 
</form>

<!-- MODAL EDITAR -->
<form id="formSolicitacaoEdit">
<div class="modal" id="modalEditar">
    <div class="modal-content">

        <h2>Editar Solicitação</h2>

        <input id="idEdit" hidden>

        <label>Solicitante</label>
        <select id="solicitanteEdit" required class="custom-select"></select>

        <label>Tipo</label>
        <select id="tipoEdit" required class="custom-select">
            <option value="predial">Predial</option>
            <option value="equipamento">Equipamento</option>
        </select>

        <label>Descrição</label>
          <textarea 
              id="descricaoEdit"
              class="descricao-box"
              placeholder="Descreva o problema"
              required
          ></textarea>

        <label>Técnico</label>
        <select id="tecnicoEdit"  class="custom-select"></select>

        <label>Prioridade</label>
        <select id="prioridadeEdit" required class="custom-select">
            <option value="baixa">Baixa</option>
            <option value="media">Média</option>
            <option value="alta">Alta</option>
            <option value="critica">Crítica</option>
        </select>

        <label>Status</label>
        <select id="statusEdit" required class="custom-select">
            <option value="aberta">Aberta</option>
            <option value="em andamento">Em andamento</option>
            <option value="concluida">Concluída</option>
            <option value="cancelada">Cancelada</option>
        </select>

        <div class="modal-buttons">
            <button onclick="fecharModal('modalEditar')">Cancelar</button>
            <button type="button" onclick="validarFormularioEdit()">Atualizar</button>
        </div>

    </div>
</div>
</form> 


<!-- MODAL VISUALIZAR SOLUÇÃO -->
<div class="modal" id="modalSolucao">

    <div class="modal-content modal-solucao">

        <h2>Detalhes da Solução</h2>

        <div class="solucao-info">

            <label>Solução</label>
            <div id="textoSolucao" class="box-solucao"></div>

            <label>Data da Conclusão</label>
            <div id="dataSolucao" class="box-data"></div>

        </div>

        <div class="modal-buttons">
            <button onclick="fecharModal('modalSolucao')">
                Fechar
            </button>
        </div>

    </div>

</div>
<footer id="rodape-usuario"></footer>

<script src="js/Solicitacoes.js"></script>

</body>
</html>
